<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 21</title>

</head>
<body style="background-color: rgb(255, 226, 231)">

<style>
    p{
        margin-right: 5px;
    }
    button{
        background-color: rgb(216, 154, 165);
    }
    button:hover{
        background-color: rgb(149, 91, 101);
        color:rgb(255, 226, 231);
    }
    input{
        display:inline-block;
    }
    input[type="text"]:hover{
        margin-left: 5px;
        background-color: rgb(248, 192, 202);
    }
    .container{
        border-radius: 2px;
        background-color: rgb(247, 204, 211);
        width: 280px;
    }
    input[type="radio"]:checked{
        accent-color: rgb(149, 91, 101);   
    }
</style> 

    <h1>Práctica 21</h1>

    <p>
        <div class="container">
            <label>Variables: </label> 
        </div>
        <p>Número 1: <input id="n1" type="text"></p>
        <p>Número 2: <input id="n2" type="text"></p>
    </p>

    <p><p><div class="container"><label>Operación: </label></div> </p>
        <input type="radio" name="x" id="s" /> <label for="c"> Suma </label>
        <input type="radio" name="x" id="r" /> <label for="g"> Resta </label>
        <input type="radio" name="x" id="m" /> <label for="c"> Multiplicación </label>
        <input type="radio" name="x" id="d"/> <label for="c"> División </label>
    </p>

    <script>
        function resultado(){
            const input1 = document.getElementById("n1").value;
            const input2 = document.getElementById("n2").value;

            const x = parseInt(input1);
            const y = parseInt(input2);

            if (document.getElementById('s').checked){
                let suma = x + y;
                alert(suma); 
            }
            else if (document.getElementById('r').checked){
            let resta = x - y;
                alert(resta);
            }
            else if (document.getElementById('m').checked){
                let multi = x * y;
                alert(multi);
            }
            else if (document.getElementById('d').checked){
                let div = x / y;
                alert(div);
            }
            else {
                let msj = "Debes seleccionar una opción";
                alert(msj);
            }
        }
    </script>

    <p><button onclick="resultado()"> Calcular </button></p>
</body>
</html>
