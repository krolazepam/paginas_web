<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 28</title>

</head>
<body style="background-color: rgb(255, 226, 231)">

<style>
    p{
        margin-right: 5px;
    }
    button{
        background-color: rgb(216, 154, 165);
    }
    button:hover{
        background-color: rgb(149, 91, 101);
        color:rgb(255, 226, 231);
    }
    input{
        display:inline-block;
    }
    input[type="text"]:hover{
        margin-left: 5px;
        background-color: rgb(248, 192, 202);
    }
    .container{
        border-radius: 2px;
        background-color: rgb(247, 204, 211);
        width: 280px;
        font-size: large;
    }
    input[type="radio"]:checked{
        accent-color: rgb(149, 91, 101);   
    }
</style> 

    <h1>Práctica 28</h1>

    <p>
        <div class="container">
            <label>Inserte los grados a convertir: </label> 
        </div>
        <p>Grados Celsius: <input id="c" type="text"></p>
    </p>

    <script>
        function CaF() {
            const c = parseFloat(document.getElementById("c").value);

            const f1 = c * 1.8;
            const f = f1 + 32; 

            alert(+c+ " Celsius = " +f+ " Fahrenheit ya que "+c+"°C * 9/5 + 32 = "+f+"°F");
        }
    </script>

    <p><button onclick="CaF()"> Calcular </button></p>
</body>
</html>
