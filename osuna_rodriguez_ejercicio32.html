<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 32</title>

</head>
<body style="background-color: rgb(255, 226, 231)">

<style>
    p{
        margin-right: 5px;
    }
    button{
        background-color: rgb(216, 154, 165);
    }
    button:hover{
        background-color: rgb(149, 91, 101);
        color:rgb(255, 226, 231);
    }
    input{
        display:inline-block;
    }
    input[type="text"]:hover{
        margin-left: 5px;
        background-color: rgb(248, 192, 202);
    }
    .container{
        border-radius: 2px;
        background-color: rgb(247, 204, 211);
        width: 280px;
        font-size: large;
    }

</style> 

    <h1>Práctica 32</h1>

    <p>
        <div class="container">
            <label>Inserte sus datos: </label> 
        </div>
        <p>Ingrese su calificación (de 0 a 100): <input id="c" type="text"></p>
    </p>

    <script>
        function calcularCalif() {
            const c = parseFloat(document.getElementById("c").value);

            if (c >= 90 && c <= 100){
                alert("Su calificación con letra es: A");
            }
            else if (c >= 80 && c <= 89){
                alert("Su calificación con letra es: B");
            }
            else if (c >= 70 && c <= 79){
                alert("Su calificación con letra es: C");
            }
            else if (c >= 60 && c <= 69){
                alert("Su calificación con letra es: D");
            }
            else if (c < 60 && c >= 0){
                alert("Su calificación con letra es: F");
            }
            else {
                alert("Rango inválido: Ingrese un valor entre 0 y 100");
            }
        }
    </script>

    <p><button onclick="calcularCalif()"> Calcular </button></p>
</body>
</html>
