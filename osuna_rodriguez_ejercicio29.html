<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 29</title>

</head>
<body style="background-color: rgb(255, 226, 231)">

<style>
    p{
        margin-right: 5px;
    }
    button{
        background-color: rgb(216, 154, 165);
    }
    button:hover{
        background-color: rgb(149, 91, 101);
        color:rgb(255, 226, 231);
    }
    input{
        display:inline-block;
    }
    input[type="text"]:hover{
        margin-left: 5px;
        background-color: rgb(248, 192, 202);
    }
    .container{
        border-radius: 2px;
        background-color: rgb(247, 204, 211);
        width: 280px;
        font-size: large;
    }
    input[type="radio"]:checked{
        accent-color: rgb(149, 91, 101);   
    }
</style> 

    <h1>Práctica 29</h1>

    <p>
        <div class="container">
            <label>Inserte el número a verificar si es par o no: </label> 
        </div>
        <p>Número: <input id="n" type="text"></p>
    </p>

    <script>
        function PoI() {
            const n = parseFloat(document.getElementById("n").value);

            if (n % 2 === 0) {
                alert(+n+ " es un número par. Ya que "+n+" dividido entre 2 tiene un resto de 0");
            } else {
                alert(+n+ " es un número impar. Ya que "+n+" dividido entre 2 tiene un resto de 1");
            }
        }

    </script>

    <p><button onclick="PoI()"> Calcular </button></p>
</body>
</html>
