<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 31</title>

</head>
<body style="background-color: rgb(255, 226, 231)">

<style>
    p{
        margin-right: 5px;
    }
    button{
        background-color: rgb(216, 154, 165);
    }
    button:hover{
        background-color: rgb(149, 91, 101);
        color:rgb(255, 226, 231);
    }
    input{
        display:inline-block;
    }
    input[type="text"]:hover{
        margin-left: 5px;
        background-color: rgb(248, 192, 202);
    }
    .container{
        border-radius: 2px;
        background-color: rgb(247, 204, 211);
        width: 280px;
        font-size: large;
    }
    input[type="radio"]:checked{
        accent-color: rgb(149, 91, 101);   
    }
</style> 

    <h1>Práctica 31</h1>

    <p>
        <div class="container">
            <label>Inserte sus datos: </label> 
        </div>
        <p>Nombre: <input id="n" type="text"></p>
        <p>Edad: <input id="e" type="text"></p>
    </p>

    <script>
        function generarUser() {
            const n = document.getElementById("n").value;
            const e = parseInt(document.getElementById("e").value);

            if (e => 18){
                alert(n+ " puede votar, ya que " +n+ " tiene " +e+ " años");
            }
            else if (e < 18){
                alert(n+ " NO puede votar, ya que " +n+ " tiene " +e+ " años");
            }

            
        }
    </script>

    <p><button onclick="generarUser()"> Calcular </button></p>
</body>
</html>
